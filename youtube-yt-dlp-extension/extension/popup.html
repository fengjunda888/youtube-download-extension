<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube 下载助手 · yt-dlp</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <header class="appHeader">
        <span class="mark" aria-hidden="true"></span>
        <div class="titleBlock">
          <div class="titleRow">
            <h1>YouTube</h1>
            <span id="version" class="version">v0.2.1</span>
          </div>
          <p>下载助手 · 本地 yt-dlp</p>
        </div>
      </header>

      <nav class="tabs" aria-label="页面" role="tablist">
        <button id="resolveTab" class="tab active" type="button" role="tab" aria-selected="true" aria-controls="resolveView" tabindex="0" data-view="resolve"><span class="tabIcon resolveIcon" aria-hidden="true"></span>视频检测</button>
        <button id="tasksTab" class="tab" type="button" role="tab" aria-selected="false" aria-controls="tasksView" tabindex="-1" data-view="tasks"><span class="tabIcon tasksIcon" aria-hidden="true"></span>下载任务</button>
        <button id="accountTab" class="tab" type="button" role="tab" aria-selected="false" aria-controls="accountView" tabindex="-1" data-view="account"><span class="tabIcon accountIcon" aria-hidden="true"></span>账号</button>
      </nav>

      <section id="resolveView" class="view active" role="tabpanel" aria-labelledby="resolveTab">
        <section class="panel">
          <div class="panelBlock">
            <div class="blockHead">
              <div>
                <strong>检测视频</strong>
                <p>粘贴链接，或直接读取当前 YouTube 页面。</p>
              </div>
            </div>
            <div class="sourceActions">
              <button id="useCurrentPage" type="button" class="ghost actionChip">当前页面</button>
              <button id="clearUrl" type="button" class="ghost actionChip">清空</button>
            </div>
          </div>

          <div class="fieldRow">
            <label for="url">YouTube 链接</label>
            <input id="url" type="text" spellcheck="false" aria-describedby="urlHint" placeholder="粘贴 YouTube 视频或播放列表链接">
            <p id="urlHint" class="fieldHint" aria-live="polite">支持视频、合集和 youtu.be 短链接。</p>
          </div>

          <div class="fieldRow">
            <div class="labelRow">
              <label for="quality">画质</label>
              <span class="inlineHint">下载格式</span>
            </div>
            <div id="qualityPresets" class="qualityPresets" aria-label="画质预设">
              <button type="button" class="qualityChip active" data-quality="best-mp4" aria-pressed="true">最佳 MP4</button>
              <button type="button" class="qualityChip" data-quality="1080" aria-pressed="false">1080p HD</button>
              <button type="button" class="qualityChip" data-quality="720" aria-pressed="false">720p</button>
              <button type="button" class="qualityChip" data-quality="480" aria-pressed="false">480p</button>
              <button type="button" class="qualityChip" data-quality="audio" aria-pressed="false">MP3</button>
            </div>
            <select id="quality" class="qualitySelect">
              <option value="best-mp4">最佳单文件 MP4</option>
              <option value="1080">最高 1080p</option>
              <option value="720">最高 720p</option>
              <option value="480">最高 480p</option>
              <option value="audio">仅音频 MP3</option>
            </select>
            <p class="fieldHint">优先保存为兼容性更好的 MP4；音频可单独保存为 MP3。</p>
          </div>

          <details class="advancedSettings">
            <summary>更多选项</summary>
            <div class="fieldRow compact">
              <label for="downloadDir">下载路径</label>
              <input id="downloadDir" type="text" spellcheck="false">
            </div>
            <label class="toggleRow" for="useBrowserCookies">
              <span>
                <strong>使用浏览器登录状态</strong>
                <small>仅在 YouTube 要求确认登录时开启。</small>
              </span>
              <input id="useBrowserCookies" type="checkbox">
            </label>
          </details>
        </section>

        <button id="resolve" type="button" disabled>检测视频</button>
        <p id="status" role="status" aria-live="polite" aria-atomic="true">正在读取当前标签页...</p>

        <section class="selection">
          <div class="sectionHead">
            <div>
              <h2>检测结果</h2>
              <p id="resolveSummary">还没有检测视频。检测后可选择要下载的视频。</p>
              <div id="resolveChips" class="summaryChips"></div>
            </div>
            <div class="selectionTools">
              <p id="selectionMeta" class="selectionMeta">未选择视频</p>
              <label class="selectAll"><input id="selectAll" type="checkbox"> 全选</label>
            </div>
          </div>
          <div class="actionDock">
            <button id="downloadSelected" type="button" disabled>添加到下载</button>
          </div>
          <div id="videoList" class="videoList"></div>
        </section>
      </section>

      <section id="tasksView" class="view" role="tabpanel" aria-labelledby="tasksTab" hidden>
        <section class="tasks">
          <div class="tasksHead">
            <div>
              <h2>下载任务</h2>
              <p>查看进度、速度和最近输出。</p>
            </div>
            <button id="refresh" type="button" class="ghost">刷新</button>
          </div>
          <div id="taskSummary" class="summaryChips taskSummary" aria-label="任务摘要"></div>
          <section id="taskOverview" class="taskOverview" aria-label="任务总览"></section>
          <div id="tasksList" class="tasksList" role="list" aria-label="下载任务列表"></div>
        </section>
      </section>

      <section id="accountView" class="view" role="tabpanel" aria-labelledby="accountTab" hidden>
        <section class="accountPanel">
          <div class="sectionHead">
            <div>
              <h2>YouTube 账号</h2>
              <p id="accountStatus" role="status" aria-live="polite" aria-atomic="true">可选功能：读取播放列表、喜欢视频和本机最近浏览。</p>
            </div>
            <button id="logoutAccount" type="button" class="ghost" hidden>退出</button>
          </div>
          <button id="loginAccount" type="button" class="secondary">登录 YouTube</button>
          <div class="noticeBar">
            <span class="noticeIcon" aria-hidden="true"></span>
            <p>账号授权是可选功能；检测和下载不需要登录。</p>
          </div>
          <div id="accountSummary" class="accountSummary"></div>
        </section>

        <section class="accountList">
          <div class="sectionHead">
            <h2>最近浏览</h2>
            <button id="loadAccount" type="button" class="ghost">刷新</button>
          </div>
          <div id="recentList" class="compactList" role="list" aria-label="最近浏览列表"></div>
        </section>

        <section class="accountList">
          <h2>喜欢的视频</h2>
          <div id="likedList" class="compactList" role="list" aria-label="喜欢的视频列表"></div>
        </section>

        <section class="accountList">
          <h2>播放列表 / 收藏</h2>
          <div id="playlistList" class="compactList" role="list" aria-label="播放列表和收藏列表"></div>
        </section>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
