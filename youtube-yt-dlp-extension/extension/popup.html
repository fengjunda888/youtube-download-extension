<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <header>
        <img class="mark" src="icons/icon-48.png" alt="" aria-hidden="true">
        <div class="titleBlock">
          <div class="titleRow">
            <h1>yt-dlp 下载</h1>
            <span id="version" class="version">v0.1.0</span>
          </div>
          <p>by fengjunda888 · 先解析视频，再选择下载</p>
        </div>
      </header>

      <nav class="tabs" aria-label="页面">
        <button id="resolveTab" class="tab active" type="button" data-view="resolve">解析选择</button>
        <button id="tasksTab" class="tab" type="button" data-view="tasks">下载任务</button>
        <button id="accountTab" class="tab" type="button" data-view="account">账号</button>
      </nav>

      <section id="resolveView" class="view active">
        <section class="panel">
          <label for="url">视频或合集链接</label>
          <textarea id="url" rows="3" spellcheck="false"></textarea>

          <label for="downloadDir">下载路径</label>
          <input id="downloadDir" type="text" spellcheck="false">

          <label for="quality">画质</label>
          <select id="quality">
            <option value="best-mp4">最佳单文件 MP4</option>
            <option value="1080">最高 1080p</option>
            <option value="720">最高 720p</option>
            <option value="480">最高 480p</option>
            <option value="audio">仅音频 MP3</option>
          </select>
        </section>

        <button id="resolve" type="button">解析链接</button>
        <p id="status" role="status">正在读取当前标签页...</p>

        <section class="selection">
          <div class="sectionHead">
            <div>
              <h2>解析结果</h2>
              <p id="resolveSummary">还没有解析视频。</p>
            </div>
            <label class="selectAll"><input id="selectAll" type="checkbox"> 全选</label>
          </div>
          <div id="videoList" class="videoList"></div>
          <button id="downloadSelected" type="button" disabled>下载选中视频</button>
        </section>
      </section>

      <section id="tasksView" class="view">
        <section class="tasks">
          <div class="tasksHead">
            <h2>下载任务</h2>
            <button id="refresh" type="button" class="ghost">刷新</button>
          </div>
          <div id="tasksList" class="tasksList"></div>
        </section>
      </section>

      <section id="accountView" class="view">
        <section class="accountPanel">
          <div class="sectionHead">
            <div>
              <h2>YouTube 账号</h2>
              <p id="accountStatus">登录后读取播放列表、喜欢视频和本机最近浏览。</p>
            </div>
            <button id="logoutAccount" type="button" class="ghost">退出</button>
          </div>
          <button id="loginAccount" type="button">登录 YouTube</button>
          <div id="accountSummary" class="accountSummary"></div>
        </section>

        <section class="accountList">
          <div class="sectionHead">
            <h2>最近浏览</h2>
            <button id="loadAccount" type="button" class="ghost">刷新</button>
          </div>
          <div id="recentList" class="compactList"></div>
        </section>

        <section class="accountList">
          <h2>喜欢的视频</h2>
          <div id="likedList" class="compactList"></div>
        </section>

        <section class="accountList">
          <h2>播放列表 / 收藏</h2>
          <div id="playlistList" class="compactList"></div>
        </section>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
